# Dev-only wrangler config — excludes [ai] binding which breaks edge-preview proxy
name = "cf-demo-app"
account_id = "5efa272dc28e4e3933324c44165b6dbe"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# R2 - Crawler data storage (for AI Search / AutoRAG indexing)
[[r2_buckets]]
binding = "CRAWLER_BUCKET"
bucket_name = "cf-demo-crawler"

# KV Namespace - Sessions
[[kv_namespaces]]
binding = "KV"
id = "cd03af00eb9340a180014760028fbebd"

[vars]
CF_ACCOUNT_ID = "5efa272dc28e4e3933324c44165b6dbe"
AI_GATEWAY_ID = "nkcf-gateway-01"
AUTORAG_NAME = "cf-demo-ai-search"
MCP_SERVER_URLS = "cf-docs=https://docs.mcp.cloudflare.com/mcp,cf-observability=https://observability.mcp.cloudflare.com/mcp:oauth,cf-radar=https://radar.mcp.cloudflare.com/mcp:oauth,sap=https://sap-mcp.neokung.work/mcp,salesforce=https://salesforce-mcp.neokung.work/mcp"
