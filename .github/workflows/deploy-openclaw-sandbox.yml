name: Deploy cf-openclaw-sandbox

on:
  push:
    branches:
      - main
    paths:
      - 'workers/openclaw-sandbox/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Companion Worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: workers/openclaw-sandbox

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 5efa272dc28e4e3933324c44165b6dbe
          workingDirectory: workers/openclaw-sandbox
          command: deploy
